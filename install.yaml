apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: qemu
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: qemu
  template:
    metadata:
      labels:
        app: qemu
    spec:
      hostPID: true
      hostNetwork: true
      restartPolicy: Always
      containers:
      - image: ghcr.io/n-arno/scaleway-kapsule-qemu:latest
        imagePullPolicy: Always
        name: qemu
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: k8s-node
          mountPath: /k8s-node
      volumes:
      - name: k8s-node
        hostPath:
          path: /tmp/qemu
      tolerations:
        - key: k8s.scaleway.com/qemu
          operator: Equal
          value: "enabled"
          effect: NoSchedule
      nodeSelector:
        k8s.scaleway.com/qemu: enabled
